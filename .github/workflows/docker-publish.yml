name: Docker Publish

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch OpenClaw Source
        run: |
          REPO="openclaw/openclaw"
          VERSION=$(curl -fsSL "https://api.github.com/repos/${REPO}/releases/latest" | jq -r '.tag_name')
          echo "Latest version: $VERSION"
          URL="https://github.com/${REPO}/archive/refs/tags/${VERSION}.tar.gz"
          mkdir -p .openclaw_src
          curl -fsSL "$URL" | tar -xzC .openclaw_src --strip-components=1
          # 确保使用 DevKit 的 Dockerfile 替换源码中的原始文件
          cp Dockerfile .openclaw_src/Dockerfile
          cp Dockerfile.java .openclaw_src/Dockerfile.java
          cp Dockerfile.office .openclaw_src/Dockerfile.office
          echo "Source and devkit Dockerfiles prepared in .openclaw_src"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Standard Image
        uses: docker/build-push-action@v5
        with:
          context: .openclaw_src
          file: .openclaw_src/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Java Image
        uses: docker/build-push-action@v5
        with:
          context: .openclaw_src
          file: .openclaw_src/Dockerfile.java
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:java
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Office Image
        uses: docker/build-push-action@v5
        with:
          context: .openclaw_src
          file: .openclaw_src/Dockerfile.office
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:office
          cache-from: type=gha
          cache-to: type=gha,mode=max
